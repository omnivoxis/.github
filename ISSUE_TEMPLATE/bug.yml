name: Bug
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly and concisely.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps To Reproduce
      description: List the exact steps so others can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        Or provide a screenshot or gif showing the issue.
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort Estimate
      description: "How long do you expect this to take? Also apply the matching `effort: N` label (1–10) to this issue."
      options:
        - "1 — trivial (few hours)"
        - "2 — very small (< 1 day)"
        - "3 — small (1 day)"
        - "4 — small-medium (1–2 days)"
        - "5 — medium (2–3 days)"
        - "6 — medium-large (3–4 days)"
        - "7 — large (4–5 days)"
        - "8 — very large (1 week)"
        - "9 — extra large (1–2 weeks)"
        - "10 — massive (2+ weeks)"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Checklist of conditions that must be met to close this issue.
      placeholder: |
        - [ ] Bug cause is identified
        - [ ] Fix is implemented
        - [ ] Fix is verified
    validations:
      required: true

